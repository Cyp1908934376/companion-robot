global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: "gateway"
    static_configs:
      - targets: ["gateway:9180"]
    metrics_path: /metrics

  - job_name: "device-manager"
    static_configs:
      - targets: ["device-manager:9181"]
    metrics_path: /metrics

  - job_name: "scheduler"
    static_configs:
      - targets: ["scheduler:9182"]
    metrics_path: /metrics

  - job_name: "ai-service"
    static_configs:
      - targets: ["ai-service:9183"]
    metrics_path: /metrics

  - job_name: "nats"
    static_configs:
      - targets: ["nats:8222"]

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
