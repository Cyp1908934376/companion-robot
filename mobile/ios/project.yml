name: CompanionRobot
options:
  bundleIdPrefix: com.companion.robot
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    INFOPLIST_FILE: CompanionRobot/Info.plist

targets:
  CompanionRobot:
    type: application
    platform: iOS
    sources:
      - path: CompanionRobot
        excludes:
          - "Info.plist"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.companion.robot
        INFOPLIST_FILE: CompanionRobot/Info.plist
        TARGETED_DEVICE_FAMILY: "1"
        ENABLE_PREVIEWS: "YES"
        DEVELOPMENT_TEAM: ""
    preBuildScripts:
      - name: "SwiftLint"
        script: |
          if which swiftlint > /dev/null; then
            swiftlint
          fi
        basedOnDependencyAnalysis: false
    dependencies: []
